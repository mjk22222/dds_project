<!DOCTYPE html>
<html lang="ru"><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <h2>{% if transaction %}Редактирование{% else %}Новая запись{% endif %}</h2>
    <form method="post" id="form">
        {% csrf_token %}
        <select name="status" class="form-control mb-2" required>
            {% for s in statuses %}<option value="{{ s.id }}" {% if transaction.status_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}
        </select>
        <select name="type" id="type" class="form-control mb-2" required>
            <option value="">Тип...</option>
            {% for t in types %}<option value="{{ t.id }}" {% if transaction.transaction_type_id == t.id %}selected{% endif %}>{{ t.name }}</option>{% endfor %}
        </select>
        <select name="category" id="category" class="form-control mb-2" required></select>
        <select name="subcategory" id="subcategory" class="form-control mb-2" required></select>
        <input type="number" name="amount" class="form-control mb-2" value="{{ transaction.amount }}" required>
        <textarea name="comment" class="form-control mb-2">{{ transaction.comment }}</textarea>
        <button type="submit" class="btn btn-success">Сохранить</button>
    </form>
    <script>
        const typeEl = document.getElementById('type'), catEl = document.getElementById('category'), subEl = document.getElementById('subcategory');

        async function loadOptions(url, selectEl, selectedId) {
            const res = await fetch(url);
            const data = await res.json();
            selectEl.innerHTML = '<option value="">Выберите...</option>';
            data.forEach(item => selectEl.innerHTML += `<option value="${item.id}" ${item.id == selectedId ? 'selected' : ''}>${item.name}</option>`);
        }

        typeEl.addEventListener('change', () => loadOptions(`/api/categories/?transaction_type=${typeEl.value}`, catEl));
        catEl.addEventListener('change', () => loadOptions(`/api/subcategories/?category=${catEl.value}`, subEl));

        // Инициализация при редактировании
        {% if transaction %}
            loadOptions(`/api/categories/?transaction_type={{transaction.transaction_type_id}}`, catEl, {{transaction.category_id}});
            loadOptions(`/api/subcategories/?category={{transaction.category_id}}`, subEl, {{transaction.subcategory_id}});
        {% endif %}
    </script>
</body></html>
